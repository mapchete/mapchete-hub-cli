name: Python package test

on:
  schedule:
    - cron: '0 8 * * 1,4'  
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: ['**']
  workflow_call:
    inputs:
      override-deps-artifact:
        description: "Name of artifact containing updated lockfiles"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "📝 Pre-commit / Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: ${{ github.job }}
      - name: 🏃 Run Pre-commit
        run: |
          uv tool install pre-commit
          uv tool run pre-commit run --show-diff-on-failure --all-files
      - name: 🧹 Cache Prune
        run: uv cache prune --ci

  test:
    needs: lint
    name: "🧪 py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: 📥 Apply Dependency Overrides
        if: "${{ inputs.override-deps-artifact != '' && inputs.override-deps-artifact != 'null' }}"
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.override-deps-artifact }}
      
      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: ${{ matrix.python-version }}

      - name: 🏗️ Sync Environment
        run: |
          uv sync --frozen --all-extras --python ${{ matrix.python-version }}
         
      - name: 🧪 Run Tests
        env:
          CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
          COVERAGE_FILE: .coverage.python.${{ matrix.python-version }}
        run: |
            uv run pytest -v \
            --cov=mapchete_hub_cli \
            --cov-report=xml:coverage.xml \
            --junitxml="pytest-${{ matrix.python-version }}.xml"

      - name: 📊 Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: true

      - name: 📤 Upload Coverage Chunk (Latest Only)
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-chunk-all
          path: .coverage.python.${{ matrix.python-version }}
          include-hidden-files: true
          retention-days: 1

      - name: 📤 Archive JUnit Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.xml
          retention-days: 1
      
      - name: 🧹 Cache Prune
        run: uv cache prune --ci

  summary:
    name: "📊 Final Summary & Coverage"
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # Needed for coverage to see source files

      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-suffix: ${{ github.job }}

      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-results
          pattern: "*-*" 
          merge-multiple: true

      - name: 📊 Check Tests & Coverage
        run: |
          echo "### 🧪 Test & Coverage Summary" >> $GITHUB_STEP_SUMMARY
          
          # 1. STATUS REPORT
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          # Test Status
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # 2. PREPARE COVERAGE DATA
          uv tool install coverage
          
          if ls all-results/.coverage* 1> /dev/null 2>&1; then
            mv all-results/.coverage* .
          fi
          
          # 🧹 Delete empty files
          find . -maxdepth 1 -name ".coverage*" -size 0 -print -delete
          
          echo "Merging/Preparing coverage data..."
          # combine will merge .coverage.* into .coverage
          uv tool run coverage combine --append || echo "No extra coverage files to combine."
          
          # 3. ENFORCE 70%
          echo "Generating coverage report..."
          set +e
          REPORT_OUTPUT=$(uv tool run coverage report --show-missing --fail-under=70 2>&1)
          EXIT_CODE=$?
          set -e
          
          echo "$REPORT_OUTPUT"
          
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$REPORT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ **Coverage Failed:** Coverage is below 70%." >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          else
            echo "✅ **Coverage Passed:** 70% coverage achieved." >> $GITHUB_STEP_SUMMARY
          fi

          # Fail overall if test failed
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
